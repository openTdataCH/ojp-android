material3 = { group = "androidx.compose.material3", name = "material3" }
compose-icons = { group="androidx.compose.material", name = "material-icons-extended" }
navigation = { module = "androidx.navigation:navigation-compose", version.ref = "navigation" }
accompanist-permission = { module = "com.google.accompanist:accompanist-permissions", version.ref = "accompanistPermission" }
