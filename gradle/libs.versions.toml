[versions]
agp = "9.1.0"
assertk = "0.28.1"
kotlin = "2.3.20"
coreKtx = "1.18.0"
junit = "4.13.2"
extJunit = "1.3.0"
kotlinxCoroutinesTest = "1.10.2"
xmlUtil = "0.91.3"
timber = "5.0.1"
koin = "4.2.0"
retrofit2 = "3.0.0"
okHttp = "5.3.2"
dokka = "2.2.0"
